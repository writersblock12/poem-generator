<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poem</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* 🌸 Soft pastel gradient */
      background: linear-gradient(
        135deg,
        #fceff9,
        #e0f7fa,
        #e8f5e9,
        #fff8e1
      );

      font-family: Georgia, serif;
      overflow: hidden;
    }

    /* 🌿 Center the poem naturally */
    img {
      max-width: 85%;
      max-height: 85vh;

      border-radius: 8px;

      /* subtle softness */
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);

      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
    }

    img.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

  <img id="poemImage" />

  <script>
    const poems = [
      "Clint Smith poem.jpg",
      "download (53).jpg",
      "download (52).jpg",
      "There Will Come Soft Rains.jpg",
      "download (51).jpg",
      "download (50).jpg",
      "Ellen Bass.jpg"
    ];

    const random = Math.floor(Math.random() * poems.length);
    const img = document.getElementById("poemImage");

    img.src = encodeURI(poems[random]);

    img.onload = () => {
      img.classList.add("show");
    };
  </script>

</body>
</html>
