<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Poem</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* 🔥 aesthetic background */
      background: linear-gradient(135deg, #141e30, #243b55);
    }

    .container {
      text-align: center;
      padding: 25px;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);

      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);

      width: 90%;
      max-width: 500px;
    }

    h1 {
      color: #ffffff;
      margin-bottom: 20px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);

      opacity: 0;
      transform: scale(0.95);
      transition: all 0.6s ease;
    }

    img.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Your Poem</h1>
    <img id="poemImage" />
  </div>

  <script>
    const poems = [
      "Clint Smith poem.jpg",
      "download (53).jpg",
      "download (52).jpg",
      "There Will Come Soft Rains.jpg",
      "download (51).jpg",
      "download (50).jpg",
      "Ellen Bass.jpg"
    ];

    function loadPoem() {
      const random = Math.floor(Math.random() * poems.length);
      const img = document.getElementById("poemImage");

      img.src = poems[random];

      img.onload = () => {
        img.classList.add("show");
      };
    }

    loadPoem();
  </script>

</body>
</html>
